<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台登录 - 智能数据瞭望系统</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0F172A;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 30%, rgba(245, 158, 11, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 70%, rgba(59, 130, 246, 0.1) 0%, transparent 60%);
        }
        
        .login-container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }
        
        .login-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }
        
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #F59E0B, #3B82F6, #10B981);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-header .logo {
            font-size: 52px;
            color: #F59E0B;
            margin-bottom: 16px;
        }
        
        .login-header h1 {
            font-size: 26px;
            font-weight: 700;
            color: #F1F5F9;
            margin-bottom: 8px;
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .login-header p {
            color: #94A3B8;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #94A3B8;
            font-size: 14px;
        }
        
        .input-group {
            position: relative;
        }
        
        .input-group .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748B;
            font-size: 16px;
            z-index: 10;
        }
        
        .input-group .form-control {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1.5px solid rgba(245, 158, 11, 0.2);
            border-radius: 12px;
            font-size: 15px;
            background: rgba(15, 23, 42, 0.8);
            color: #F1F5F9;
            transition: all 0.2s ease;
        }
        
        .input-group .form-control:focus {
            border-color: #F59E0B;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
            background: rgba(15, 23, 42, 0.95);
            outline: none;
        }
        
        .input-group .form-control::placeholder {
            color: #64748B;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #F59E0B;
            border: none;
            border-radius: 12px;
            color: #0F172A;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 1px 3px rgba(245, 158, 11, 0.3);
            margin-top: 8px;
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .btn-login:hover {
            background: #D97706;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
        }
        
        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #EF4444;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .slide-in {
            animation: slideInUp 0.4s ease-out;
        }
        
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="login-container slide-in">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-database logo"></i>
                <h1>智能数据瞭望系统</h1>
                <p>后台管理登录</p>
            </div>
            
            {% if error %}
            <div class="alert-error">
                <i class="fas fa-exclamation-circle"></i> {{error}}
            </div>
            {% end %}
            
            <form method="post" action="/admin/login">
                {% module xsrf_form_html() %}
                
                <div class="form-group">
                    <label for="username">用户名</label>
                    <div class="input-group">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="username" name="username" class="form-control" placeholder="请输入用户名" required autocomplete="username">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" name="password" class="form-control" placeholder="请输入密码" required autocomplete="current-password">
                    </div>
                </div>
                
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> 登 录
                </button>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
