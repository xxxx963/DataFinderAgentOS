{% extends "base.html" %}

{% block extra_css %}
<style>
    .scraping-page {
        background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0a0a1a 100%);
        min-height: 100vh;
    }
    
    .search-header {
        padding: 60px 0;
        text-align: center;
    }
    
    .logo-container {
        margin-bottom: 30px;
    }
    
    .logo {
        font-size: 48px;
        font-weight: bold;
        background: linear-gradient(90deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: logo-gradient 4s ease infinite;
    }
    
    @keyframes logo-gradient {
        0%, 100% { background-position: 0% center; }
        50% { background-position: 200% center; }
    }
    
    .logo-subtitle {
        color: #94a3b8;
        font-size: 14px;
        margin-top: 10px;
    }
    
    .search-box-container {
        max-width: 600px;
        margin: 0 auto;
        position: relative;
    }
    
    .search-box {
        width: 100%;
        height: 56px;
        padding: 0 60px 0 40px;
        font-size: 16px;
        background: rgba(30, 41, 59, 0.8);
        border: 1px solid rgba(139, 92, 246, 0.3);
        border-radius: 28px;
        color: #e2e8f0;
        transition: all 0.3s ease;
    }
    
    .search-box:focus {
        outline: none;
        border-color: #8b5cf6;
        box-shadow: 0 0 30px rgba(139, 92, 246, 0.4);
    }
    
    .search-box::placeholder {
        color: #64748b;
    }
    
    .search-icon {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        font-size: 18px;
    }
    
    .search-btn {
        position: absolute;
        right: 6px;
        top: 50%;
        transform: translateY(-50%);
        width: 44px;
        height: 44px;
        border-radius: 22px;
        background: linear-gradient(135deg, #8b5cf6, #6366f1);
        border: none;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .search-btn:hover {
        transform: translateY(-50%) scale(1.05);
        box-shadow: 0 0 25px rgba(139, 92, 246, 0.6);
    }
    
    .sources-panel {
        max-width: 800px;
        margin: 20px auto 0;
        padding: 20px;
        background: rgba(30, 41, 59, 0.6);
        border-radius: 16px;
        border: 1px solid rgba(139, 92, 246, 0.2);
    }
    
    .panel-title {
        color: #c4b5fd;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .sources-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
    }
    
    .source-tag {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(139, 92, 246, 0.3);
        border-radius: 20px;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .source-tag:hover {
        border-color: #8b5cf6;
        background: rgba(139, 92, 246, 0.1);
    }
    
    .source-tag.selected {
        background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(99, 102, 241, 0.3));
        border-color: #8b5cf6;
        box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
    }
    
    .source-tag input {
        display: none;
    }
    
    .source-tag label {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid #64748b;
        cursor: pointer;
        position: relative;
        transition: all 0.3s ease;
    }
    
    .source-tag.selected label {
        border-color: #8b5cf6;
        background: #8b5cf6;
    }
    
    .source-tag.selected label::after {
        content: '';
        position: absolute;
        top: 4px;
        left: 4px;
        width: 8px;
        height: 8px;
        background: white;
        border-radius: 50%;
    }
    
    .source-tag-name {
        color: #e2e8f0;
        font-size: 13px;
    }
    
    .config-panel {
        max-width: 800px;
        margin: 20px auto 0;
        padding: 20px;
        background: rgba(30, 41, 59, 0.6);
        border-radius: 16px;
        border: 1px solid rgba(59, 130, 246, 0.2);
    }
    
    .config-row {
        display: flex;
        gap: 20px;
        align-items: center;
    }
    
    .config-item {
        display: flex;
        align-items: center;
        gap: 12px;
    }
    
    .config-item label {
        color: #94a3b8;
        font-size: 13px;
    }
    
    .config-item input {
        width: 80px;
        padding: 8px 12px;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(59, 130, 246, 0.3);
        border-radius: 8px;
        color: #e2e8f0;
        text-align: center;
    }
    
    .config-item input:focus {
        outline: none;
        border-color: #3b82f6;
    }
    
    .results-panel {
        max-width: 1200px;
        margin: 30px auto 0;
    }
    
    .results-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }
    
    .results-count {
        color: #94a3b8;
        font-size: 14px;
    }
    
    .results-actions {
        display: flex;
        gap: 12px;
    }
    
    .action-btn {
        padding: 10px 20px;
        border-radius: 8px;
        border: none;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .action-btn-primary {
        background: linear-gradient(135deg, #8b5cf6, #6366f1);
        color: white;
    }
    
    .action-btn-primary:hover {
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        transform: translateY(-2px);
    }
    
    .action-btn-secondary {
        background: rgba(71, 85, 105, 0.5);
        color: #e2e8f0;
        border: 1px solid rgba(148, 163, 184, 0.3);
    }
    
    .action-btn-secondary:hover {
        background: rgba(71, 85, 105, 0.7);
    }
    
    .results-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
    }
    
    .result-card {
        background: linear-gradient(145deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.95) 100%);
        border: 1px solid rgba(139, 92, 246, 0.2);
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
    }
    
    .result-card:hover {
        border-color: #8b5cf6;
        transform: translateY(-5px);
        box-shadow: 0 15px 40px rgba(139, 92, 246, 0.2);
    }
    
    .result-card.selected {
        border-color: #8b5cf6;
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
    }
    
    .card-checkbox {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 24px;
        height: 24px;
        border-radius: 6px;
        border: 2px solid rgba(148, 163, 184, 0.5);
        background: rgba(15, 23, 42, 0.8);
        cursor: pointer;
        transition: all 0.2s ease;
    }
    
    .card-checkbox:hover {
        border-color: #8b5cf6;
    }
    
    .card-checkbox.selected {
        border-color: #8b5cf6;
        background: #8b5cf6;
    }
    
    .card-checkbox.selected::after {
        content: '\f00c';
        font-family: 'Font Awesome 5 Free';
        font-weight: 900;
        color: white;
        position: absolute;
        top: 2px;
        left: 5px;
        font-size: 12px;
    }
    
    .card-image {
        width: 100%;
        height: 150px;
        object-fit: cover;
        background: linear-gradient(135deg, #1e293b, #334155);
    }
    
    .card-content {
        padding: 15px;
    }
    
    .card-source {
        display: inline-block;
        padding: 4px 10px;
        background: rgba(139, 92, 246, 0.2);
        border-radius: 4px;
        font-size: 11px;
        color: #c4b5fd;
        margin-bottom: 8px;
    }
    
    .card-title {
        color: #e2e8f0;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    
    .card-summary {
        color: #94a3b8;
        font-size: 12px;
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    
    .card-url {
        color: #64748b;
        font-size: 11px;
        margin-top: 10px;
        word-break: break-all;
    }
    
    .loading-spinner {
        display: none;
        text-align: center;
        padding: 40px;
        color: #8b5cf6;
    }
    
    .loading-spinner.active {
        display: block;
    }
    
    .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(139, 92, 246, 0.2);
        border-top-color: #8b5cf6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
    }
    
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    
    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #64748b;
    }
    
    .empty-state i {
        font-size: 48px;
        margin-bottom: 20px;
        color: #475569;
    }
    
    .selected-badge {
        position: fixed;
        bottom: 30px;
        right: 30px;
        display: none;
        align-items: center;
        gap: 12px;
        padding: 15px 25px;
        background: linear-gradient(135deg, #8b5cf6, #6366f1);
        border-radius: 50px;
        color: white;
        box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
        animation: slide-up 0.3s ease;
    }
    
    .selected-badge.active {
        display: flex;
    }
    
    @keyframes slide-up {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }
    
    .selected-count {
        background: rgba(255, 255, 255, 0.2);
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
    }
    
    .save-btn {
        background: rgba(255, 255, 255, 0.2);
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s ease;
    }
    
    .save-btn:hover {
        background: rgba(255, 255, 255, 0.3);
    }
</style>
{% end %}

{% block body %}
<div class="scraping-page">
    <div class="search-header">
        <div class="logo-container">
            <div class="logo">瞭望采集</div>
            <div class="logo-subtitle">AI驱动的智能数据采集引擎</div>
        </div>
        
        <div class="search-box-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchKeyword" class="search-box" placeholder="输入搜索关键词...">
            <button id="searchBtn" class="search-btn">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </div>
    
    <div class="sources-panel">
        <div class="panel-title">
            <i class="fas fa-sitemap"></i>采集源选择
        </div>
        <div class="sources-grid" id="sourcesGrid">
            {% for i, source in enumerate(sources) %}
            <div class="source-tag" data-source-id="{{ source['id'] }}">
                <input type="checkbox" id="source-{{ source['id'] }}" class="source-checkbox" 
                       data-source-id="{{ source['id'] }}" {% if i == 0 %}checked{% end %}>
                <label for="source-{{ source['id'] }}"></label>
                <span class="source-tag-name">{{ source['name'] }}</span>
            </div>
            {% end %}
        </div>
    </div>
    
    <div class="config-panel">
        <div class="panel-title">
            <i class="fas fa-sliders-h"></i>采集配置
        </div>
        <div class="config-row">
            <div class="config-item">
                <label>采集数量：</label>
                <input type="number" id="scrapLimit" value="10" min="1" max="50">
            </div>
            <div class="config-item">
                <label>页码：</label>
                <input type="number" id="scrapPage" value="1" min="1">
            </div>
        </div>
    </div>
    
    <div class="results-panel">
        <div class="results-header">
            <div class="results-count" id="resultsCount">暂无数据</div>
            <div class="results-actions">
                <button id="selectAllBtn" class="action-btn action-btn-secondary">
                    <i class="fas fa-check-square me-2"></i>全选
                </button>
                <button id="clearAllBtn" class="action-btn action-btn-secondary">
                    <i class="fas fa-square me-2"></i>清除
                </button>
            </div>
        </div>
        
        <div class="loading-spinner" id="loadingSpinner">
            <div class="spinner"></div>
            <div>正在采集数据...</div>
        </div>
        
        <div class="results-grid" id="resultsGrid">
            <div class="empty-state">
                <i class="fas fa-search"></i>
                <div>输入关键词开始采集</div>
                <div class="text-sm mt-2">选择采集源并点击搜索按钮</div>
            </div>
        </div>
    </div>
    
    <div class="selected-badge" id="selectedBadge">
        <span class="selected-count" id="selectedCount">0</span>
        <span>已选择</span>
        <div class="save-btn" id="saveBtn">
            <i class="fas fa-save me-1"></i>保存
        </div>
    </div>
    
    {% module xsrf_form_html() %}
</div>

<script>
    const selectedItems = new Map();
    
    document.getElementById('searchBtn').addEventListener('click', performSearch);
    document.getElementById('searchKeyword').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') performSearch();
    });
    
    async function performSearch() {
        const keyword = document.getElementById('searchKeyword').value.trim();
        if (!keyword) {
            alert('请输入搜索关键词');
            return;
        }
        
        const selectedSourceIds = Array.from(document.querySelectorAll('.source-checkbox:checked'))
            .map(cb => cb.dataset.sourceId);
        
        if (selectedSourceIds.length === 0) {
            alert('请至少选择一个采集源');
            return;
        }
        
        const limit = document.getElementById('scrapLimit').value;
        const page = document.getElementById('scrapPage').value;
        
        document.getElementById('loadingSpinner').classList.add('active');
        document.getElementById('resultsGrid').innerHTML = '';
        
        const response = await fetch('/admin/scraping/search', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-XSRFToken': document.querySelector('input[name=_xsrf]').value
            },
            body: new URLSearchParams({
                keyword,
                source_ids: selectedSourceIds,
                limit,
                page
            })
        });
        
        const data = await response.json();
        
        document.getElementById('loadingSpinner').classList.remove('active');
        
        if (data.success && data.results.length > 0) {
            renderResults(data.results);
            document.getElementById('resultsCount').textContent = `共 ${data.results.length} 条结果`;
        } else {
            document.getElementById('resultsGrid').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-search"></i>
                    <div>未找到相关数据</div>
                </div>
            `;
            document.getElementById('resultsCount').textContent = '暂无数据';
        }
    }
    
    function renderResults(results) {
        const grid = document.getElementById('resultsGrid');
        grid.innerHTML = results.map((item, index) => `
            <div class="result-card" data-item-index="${index}">
                <div class="card-checkbox" onclick="toggleSelect(${index})"></div>
                ${item.image_url ? `<img src="${item.image_url}" class="card-image" alt="${item.title}">` : '<div class="card-image"></div>'}
                <div class="card-content">
                    <span class="card-source">${item.source_name}</span>
                    <div class="card-title">${item.title}</div>
                    ${item.summary ? `<div class="card-summary">${item.summary}</div>` : ''}
                    <div class="card-url">${item.url}</div>
                </div>
            </div>
        `).join('');
        
        window.currentResults = results;
        selectedItems.clear();
        updateSelectedBadge();
    }
    
    function toggleSelect(index) {
        const card = document.querySelector(`[data-item-index="${index}"]`);
        const checkbox = card.querySelector('.card-checkbox');
        
        if (selectedItems.has(index)) {
            selectedItems.delete(index);
            card.classList.remove('selected');
            checkbox.classList.remove('selected');
        } else {
            selectedItems.set(index, window.currentResults[index]);
            card.classList.add('selected');
            checkbox.classList.add('selected');
        }
        
        updateSelectedBadge();
    }
    
    document.getElementById('selectAllBtn').addEventListener('click', () => {
        const cards = document.querySelectorAll('.result-card');
        cards.forEach((card, index) => {
            if (!selectedItems.has(index)) {
                toggleSelect(index);
            }
        });
    });
    
    document.getElementById('clearAllBtn').addEventListener('click', () => {
        const cards = document.querySelectorAll('.result-card');
        cards.forEach((card, index) => {
            if (selectedItems.has(index)) {
                toggleSelect(index);
            }
        });
    });
    
    function updateSelectedBadge() {
        const badge = document.getElementById('selectedBadge');
        const count = document.getElementById('selectedCount');
        
        if (selectedItems.size > 0) {
            badge.classList.add('active');
            count.textContent = selectedItems.size;
        } else {
            badge.classList.remove('active');
        }
    }
    
    document.getElementById('saveBtn').addEventListener('click', async () => {
        if (selectedItems.size === 0) return;
        
        const items = Array.from(selectedItems.values());
        
        const response = await fetch('/admin/scraping/save', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-XSRFToken': document.querySelector('input[name=_xsrf]').value
            },
            body: new URLSearchParams({
                items: JSON.stringify(items)
            })
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert(`成功保存 ${data.saved_count} 条数据`);
            const cards = document.querySelectorAll('.result-card');
            cards.forEach((card, index) => {
                if (selectedItems.has(index)) {
                    toggleSelect(index);
                }
            });
        } else {
            alert('保存失败：' + data.error);
        }
    });
    
    document.querySelectorAll('.source-tag').forEach(tag => {
        tag.addEventListener('click', () => {
            const checkbox = tag.querySelector('.source-checkbox');
            checkbox.checked = !checkbox.checked;
            tag.classList.toggle('selected', checkbox.checked);
        });
    });
</script>
{% end %}
