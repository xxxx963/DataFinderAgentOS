{% extends "user_base.html" %}
{% block extra_css %}
<link rel="stylesheet" href="/static/css/user-style.css">
{% end %}

{% block body %}
<div class="auth-page">
    <div class="auth-container fade-in-up">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1 class="auth-title">创建账户</h1>
                <p class="auth-subtitle">注册开始使用智能数据助手</p>
            </div>
            
            {% if error %}
            <div class="auth-error">
                <i class="fas fa-exclamation-circle"></i>
                {{ error }}
            </div>
            {% end %}
            
            <form class="auth-form" method="post" action="/register">
                {% module xsrf_form_html() %}
                <div class="auth-form-group">
                    <label class="auth-label" for="username">
                        <i class="fas fa-user me-1"></i>用户名
                    </label>
                    <input type="text" class="auth-input" id="username" name="username" required placeholder="请输入用户名">
                </div>
                <div class="auth-form-group">
                    <label class="auth-label" for="password">
                        <i class="fas fa-lock me-1"></i>密码
                    </label>
                    <input type="password" class="auth-input" id="password" name="password" required placeholder="请输入密码（至少6位）">
                </div>
                <div class="auth-form-group">
                    <label class="auth-label" for="confirm_password">
                        <i class="fas fa-lock me-1"></i>确认密码
                    </label>
                    <input type="password" class="auth-input" id="confirm_password" name="confirm_password" required placeholder="请再次输入密码">
                </div>
                <button type="submit" class="auth-btn">
                    <i class="fas fa-user-plus me-2"></i>注册
                </button>
            </form>
            
            <div class="auth-footer">
                <p class="auth-footer-text">
                    已有账户？<a href="/" class="auth-footer-link">立即登录</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% end %}
